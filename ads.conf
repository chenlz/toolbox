[rewrite_local]

; --- 虎扑 ---
^https?:\/\/goblin\.hupu\.com\/\d+\/[\d.]+\/(interfaceAd\/getOther\/(v3|batch)|toutiao\/app|config\/app) url reject-dict
^https?:\/\/goblin\.hupu\.com\/\d+\/[\d.]+\/config\/reportppas url reject-200
^https?:\/\/bbs\.mobileapi\.hupu\.com\/\d+\/[\d.]+\/bbsallapi\/event\/v1\/getAllPopupCmd url reject-dict
^https?:\/\/e-goblin\.hupu\.com\/(bm|cm|rm|wm|pm|cacheWin|newFilter) url reject

; --- 哔哩哔哩 ---
; Fawkes 特性配置（含开屏广告数据，全 CDN 节点覆盖）
^https?:\/\/i\d\.hdslb\.com\/bfs\/fawkes\/ url reject-200
^https?:\/\/cm\.bilibili\.com\/cm\/api\/ url reject-dict

[filter]
; 广告 SDK 域名（快速拒绝，避免页面等待超时）
DOMAIN-SUFFIX,ccdace.hupu.com,REJECT

[mitm]
hostname = goblin.hupu.com, e-goblin.hupu.com, bbs.mobileapi.hupu.com, cm.bilibili.com, *.hdslb.com
