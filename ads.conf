; =======================================================
; Ad-Block - Quantumult X
; =======================================================

[rewrite_local]

; --- 虎扑 ---
^https?:\/\/goblin\.hupu\.com\/\d+\/[\d.]+\/(interfaceAd\/getOther\/(v3|batch)|toutiao\/app|config\/app) url reject-dict
^https?:\/\/goblin\.hupu\.com\/\d+\/[\d.]+\/config\/reportppas url reject-200
^https?:\/\/bbs\.mobileapi\.hupu\.com\/\d+\/[\d.]+\/bbsallapi\/event\/v1\/getAllPopupCmd url reject-dict
^https?:\/\/e-goblin\.hupu\.com\/(bm|cm|rm|wm|pm|cacheWin|newFilter) url reject

; --- 哔哩哔哩 ---
; 开屏广告主接口（splash/show 返回空数据，但 ColdStart 才是实际投放渠道）
^https?:\/\/app\.bilibili\.com\/x\/v2\/splash\/(show|list|elected) url reject-dict
; 冷启动广告 - HTTP fallback（app.bilibili.com）
^https?:\/\/app\.bilibili\.com\/bilibili\.app\.coldstart\.v1\.ColdStart\/GetColdStartDeferredData url reject
; 冷启动广告 - gRPC 主通道（grpc.biliapi.net，返回 application/grpc 二进制流）
^https?:\/\/grpc\.bilibili\.net\/bilibili\.app\.coldstart\.v1\.ColdStart\/GetColdStartDeferredData url reject
; 开屏广告视频素材 CDN（upos-sz-static 播放器）
^https?:\/\/upos-sz-static\.bilivideo\.com\/ssaxcode\/.*SPLASH.* url reject
; 品牌广告素材 CDN
^https?:\/\/i\d\.hdslb\.com\/bfs\/sycp_brand\/ url reject-200
; 广告 SDK 数据上报
^https?:\/\/cm\.bilibili\.com\/cm\/api\/ url reject-dict
; 点击跟踪
^https?:\/\/cid-click\.smallfighter\.com\/cid\/click url reject

[filter]
; 广告 SDK 域名（快速拒绝，避免页面等待超时）
DOMAIN-SUFFIX,ccdace.hupu.com,REJECT

[mitm]
hostname = goblin.hupu.com, e-goblin.hupu.com, bbs.mobileapi.hupu.com, cm.bilibili.com, *.hdslb.com, grpc.biliapi.net, app.bilibili.com, upos-sz-static.bilivideo.com
