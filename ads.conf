[rewrite_local]

; --- 虎扑 ---
^https?:\/\/goblin\.hupu\.com\/\d+\/[\d.]+\/(interfaceAd\/getOther\/(v3|batch)|toutiao\/app|config\/app) url reject-dict
^https?:\/\/goblin\.hupu\.com\/\d+\/[\d.]+\/config\/reportppas url reject-200
^https?:\/\/bbs\.mobileapi\.hupu\.com\/\d+\/[\d.]+\/bbsallapi\/event\/v1\/getAllPopupCmd url reject-dict
^https?:\/\/e-goblin\.hupu\.com\/(bm|cm|rm|wm|pm|cacheWin|newFilter) url reject

; --- 哔哩哔哩 ---
; gRPC 广告配置 HTTP fallback
^https?:\/\/grpc\.biliapi\.net\/bilibili\.app\.(wall\.v1\.Wall|coldstart\.v1\.ColdStart)\/ url reject-dict
; HTTP 广告接口
^https?:\/\/cm\.bilibili\.com\/cm\/api\/ url reject-dict
; 广告图片 CDN
^https?:\/\/i\d\.hdslb\.com\/bfs\/(sycp_brand|garb)\/ url reject-200

[filter]
DOMAIN-SUFFIX,grpc.biliapi.net,REJECT

[mitm]
hostname = goblin.hupu.com, e-goblin.hupu.com, bbs.mobileapi.hupu.com, grpc.biliapi.net, cm.bilibili.com, i0.hdslb.com, *.hdslb.com
